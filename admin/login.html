<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — LuMin Group 管理后台</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-header">
      <i class="ph ph-lock-key"></i>
      <h1>LuMin Group</h1>
      <p>后台管理系统</p>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label><i class="ph ph-user"></i> 用户名</label>
        <input type="text" id="username" required placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label><i class="ph ph-password"></i> 密码</label>
        <input type="password" id="password" required placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div id="loginError" class="error-msg" style="display:none;"></div>
      <button type="submit" class="btn-login">
        <i class="ph ph-sign-in"></i> 登 录
      </button>
    </form>
  </div>

  <script>
    // If already logged in, redirect
    (function() {
      var token = localStorage.getItem('admin-token');
      if (token) {
        window.location.href = 'index.html';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      if (!username || !password) {
        errEl.textContent = '请输入用户名和密码';
        errEl.style.display = 'block';
        return;
      }

      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || '登录失败';
          errEl.style.display = 'block';
          return;
        }
        localStorage.setItem('admin-token', data.token);
        localStorage.setItem('admin-user', data.username);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = '网络错误，请检查服务器是否运行';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
